# This is a Spack Environment file.
#
# It describes a set of packages to be installed, along with
# configuration settings.
#dummy config ci
spack:
  specs:
    - access-am3@git.2026.01.000
  packages:
    # Direct dependencies
    um:
      require:
        - '@13.1'
        - model="vn13p1-am"
        - jules_ref="5f07a3665ee44c1014c2ac9a074752e2f7c1bad5"
        - um_ref="dfbb8ba8f583191d66f4cb1c31f081e2627f2073"

    # Indirect dependencies
    netcdf-c:
      require:
        - '@4.9.2'

    netcdf-fortran:
      require:
        - '@4.5.2'

    fcm:
      require:
        - '@2021.05.0'
        # TODO: Generalize this Gadi-specific variant for spack.yaml
        - 'site=nci-gadi'

    gcom:
      require:
        - '@7.9'

    openmpi:
      require:
        - '@4.1.7'

    # Specifications that apply to all packages
    all:
      require:
        - '%intel@2021.10.0'
        - target=x86_64_v4
  view: true
  concretizer:
    unify: true
  config:
    install_tree:
      root: $spack/../restricted/ukmo/release
    source_cache: $spack/../restricted/ukmo/source_cache
    build_stage:
    - $TMPDIR/restricted/spack-stage
